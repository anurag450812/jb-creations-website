    <meta charset="UTF-8" />

    <style>
        :root {
            --primary-color: #16697A;
            --secondary-color: #EDE7E3;
            --accent-color: #489FB5;
            --background-color: #EDE7E3;
            --text-color: #16697A;
            --card-background: #FFFFFF;
            --success-color: #82C0CC;
            --highlight-color: #FFA62B;
            --border-radius: 12px;
            --shadow: 0 4px 16px rgba(22, 105, 122, 0.1);
        }
            /* Header uses global styles from style.css for consistency across pages */

        body {
            background-color: var(--background-color);
            color: var(--text-color);
        }

        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 100px; /* Space for fixed header */
        }
        
        /* Fix mobile header positioning */
        @media (max-width: 768px) {
            .site-header,
            #globalSiteHeader {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                z-index: 2500 !important;
                background: #EDE7E3 !important;
                box-shadow: none !important;
            }
            
            .profile-container {
                padding-top: 80px !important;
            }
        }
        
        @media (max-width: 480px) {
            .profile-container {
                padding-top: 70px !important;
            }
        }

        .page-header {
            background: linear-gradient(135deg, #82C0CC 0%, #489FB5 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(130,192,204,0.3);
            margin-bottom: 24px;
            text-align: center;
        }

        .page-header h1 { color: #fff; margin-bottom: 8px; }
        .page-header p { color: rgba(255,255,255,0.92); margin: 0; }

        .profile-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(22, 105, 122, 0.1);
            overflow: hidden;
            margin-bottom: 18px;
            border: 1px solid rgba(22,105,122,0.08);
        }

        .profile-top {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 18px;
            background: linear-gradient(145deg, rgba(130, 192, 204, 0.18), rgba(130, 192, 204, 0.08));
        }

        .avatar {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 32px; box-shadow: 0 6px 18px rgba(72,159,181,0.25);
            flex-shrink: 0;
        }

        .user-main {
            flex: 1; min-width: 0;
        }
        .user-name {
            font-size: 1.4rem; font-weight: 800; color: var(--primary-color);
        }
        .user-phone { color: #489FB5; font-weight: 600; margin-top: 2px; }

        .edit-actions {
            margin-left: auto; display: flex; gap: 10px;
        }
        .btn-icon {
            background: #fff; border: 1px solid rgba(22,105,122,0.15);
            color: var(--primary-color); border-radius: 10px; padding: 8px 10px;
            cursor: pointer; transition: all .2s ease; display: inline-flex; align-items: center; gap: 8px; font-weight: 600;
        }
        .btn-icon:hover { background: var(--primary-color); color: #fff; transform: translateY(-1px); }

        .profile-details { padding: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .detail-item { background: #F9F7F5; border: 1px solid rgba(22,105,122,0.08); border-radius: 12px; padding: 14px; }
        .detail-label { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: rgba(22,105,122,.7); font-weight: 700; }
        .detail-value { margin-top: 4px; font-weight: 700; color: var(--text-color); word-break: break-word; }

        .section {
            background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(22,105,122,0.1);
            border: 1px solid rgba(22,105,122,0.08); overflow: hidden; margin-bottom: 18px;
        }
        .section-header { padding: 14px 18px; background: #16697A; color: #fff; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .section-body { padding: 16px; }

        .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .quick-card { background: #EDE7E3; border: 1px solid rgba(22,105,122,0.12); border-radius: 12px; padding: 14px; display: flex; gap: 12px; align-items: center; cursor: pointer; transition: all .2s ease; }
        .quick-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .quick-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; background: linear-gradient(135deg, #489FB5, #82C0CC); }
        .quick-title { font-weight: 700; color: var(--text-color); }
        .quick-sub { font-size: 12px; color: rgba(22,105,122,0.75); }

        .actions-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .btn-primary { background: var(--primary-color); color: #fff; border: none; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: #6B6B6B; color: #fff; border: none; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
        .btn-outline { background: #fff; color: var(--primary-color); border: 2px solid var(--primary-color); border-radius: 10px; padding: 9px 14px; font-weight: 700; cursor: pointer; }
        .btn-danger { background: #dc3545; color: #fff; border: none; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }

        .empty-state { text-align: center; padding: 36px 16px; color: rgba(22,105,122,0.75); }
        .empty-state i { font-size: 48px; color: rgba(130,192,204,0.6); margin-bottom: 8px; }

        /* Edit modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal { background: #fff; width: 95%; max-width: 460px; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; }
        .modal-header { padding: 14px 18px; background: #16697A; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .modal-body { padding: 16px; display: grid; gap: 12px; }
        .form-field { display: grid; gap: 6px; }
        .form-field label { font-size: 12px; font-weight: 700; color: rgba(22,105,122,0.8); text-transform: uppercase; }
        .form-field input { padding: 10px 12px; border: 1px solid rgba(22,105,122,0.25); border-radius: 10px; outline: none; font-size: 14px; }
        .modal-actions { padding: 14px 16px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid rgba(0,0,0,0.06); }
        .modal-overlay.show { display: flex; }

        @media (max-width: 768px) {
            .profile-details { grid-template-columns: 1fr; }
            .profile-top { align-items: flex-start; }
            .edit-actions { margin-left: 0; }
            .quick-actions { grid-template-columns: 1fr 1fr; }
            .profile-container { padding: 16px; }

            /* Colorful profile-card styling for mobile - like policy/reviews sections */
            .profile-card {
                background: linear-gradient(135deg, #f0f9fb 0%, #e8f4f6 100%) !important;
                border: 1px solid rgba(22, 105, 122, 0.15) !important;
                box-shadow: 0 4px 15px rgba(22, 105, 122, 0.08) !important;
                border-radius: 16px !important;
            }
            
            .profile-top {
                background: linear-gradient(145deg, rgba(130, 192, 204, 0.2), rgba(130, 192, 204, 0.1)) !important;
            }
            
            /* Style detail items like policy-item cards */
            .detail-item {
                background: rgba(255, 255, 255, 0.85) !important;
                border: 1px solid rgba(22, 105, 122, 0.08) !important;
                border-radius: 12px !important;
                transition: transform 0.2s ease, box-shadow 0.2s ease !important;
            }
            
            .detail-item:hover {
                transform: translateX(4px) !important;
                box-shadow: 0 2px 10px rgba(22, 105, 122, 0.1) !important;
            }

            /* Colorful section styling for mobile */
            .section {
                background: linear-gradient(135deg, #fff9f0 0%, #fff5e6 100%) !important;
                border: 1px solid rgba(255, 166, 43, 0.2) !important;
                box-shadow: 0 4px 15px rgba(255, 166, 43, 0.1) !important;
                border-radius: 16px !important;
            }
            .section-header {
                background: transparent;
                color: var(--primary-color);
                padding: 12px 14px;
                font-size: 0.95rem;
                border-bottom: 1px solid rgba(255, 166, 43, 0.2);
            }
            .section-body { padding: 14px; }

            .quick-card {
                background: rgba(255, 255, 255, 0.85) !important;
                border: 1px solid rgba(22, 105, 122, 0.08) !important;
                box-shadow: 0 2px 10px rgba(22, 105, 122, 0.08) !important;

                align-items: center;
                text-align: center;
                gap: 8px;
                border-radius: 12px !important;
                transition: transform 0.2s ease, box-shadow 0.2s ease !important;
            }
            .quick-card:hover { 
                transform: translateX(4px) !important;
                box-shadow: 0 4px 15px rgba(22, 105, 122, 0.12) !important;
            }
            .quick-icon { width: 36px; height: 36px; border-radius: 10px; }
            .quick-title { font-size: 0.95rem; }
            .quick-sub { display: none; }

            /* Colorful buttons for Security & Preferences */
            .actions-row { gap: 8px; }
            .btn-primary, .btn-outline, .btn-danger {
                background: rgba(255, 255, 255, 0.85);
                color: var(--primary-color);
                border: 1px solid rgba(72,159,181,0.3);
                box-shadow: 0 2px 8px rgba(22,105,122,0.1);
                padding: 9px 12px;

                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }
            .btn-danger {
                background: rgba(255, 255, 255, 0.85);
                border-color: rgba(220,53,69,0.3);
                color: #c0392b;
            }
            .btn-primary:hover, .btn-outline:hover { 
                transform: translateX(4px);
                box-shadow: 0 4px 12px rgba(22,105,122,0.15);
            }
            .btn-danger:hover { 
                transform: translateX(4px);
                box-shadow: 0 4px 12px rgba(220,53,69,0.15);
            }
        }
    </style>

    <script>
        function setProfileDropdownState(isOpen) {
            const dropdownContainer = document.getElementById('profileDropdown');
            const dropdownMenu = document.getElementById('profileDropdownMenu');
            const profileBtn = document.getElementById('profileBtn');
            if (!dropdownContainer || !dropdownMenu || !profileBtn) return;
            dropdownContainer.classList.toggle('open', isOpen);
            profileBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            dropdownMenu.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
        }
        function toggleProfileDropdown() {
            const dropdownContainer = document.getElementById('profileDropdown');
            if (!dropdownContainer) return;
            setProfileDropdownState(!dropdownContainer.classList.contains('open'));
        }
        function setupProfileDropdown() {
            const dropdownContainer = document.getElementById('profileDropdown');
            const dropdownMenu = document.getElementById('profileDropdownMenu');
            const profileBtn = document.getElementById('profileBtn');
            if (!dropdownContainer || !dropdownMenu || !profileBtn || dropdownContainer.dataset.dropdownInit === 'true') return;
            dropdownContainer.dataset.dropdownInit = 'true';
            profileBtn.setAttribute('aria-haspopup', 'true');
            profileBtn.setAttribute('aria-expanded', 'false');
            dropdownMenu.setAttribute('role', 'menu');
            dropdownMenu.setAttribute('aria-hidden', 'true');
            profileBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); toggleProfileDropdown(); });
            dropdownMenu.addEventListener('click', function(event) {
                const actionableItem = event.target.closest('a, button');
                if (actionableItem && actionableItem.dataset.closeDropdown === 'true') {
                    setProfileDropdownState(false);
                }
            });
            setProfileDropdownState(false);
        }

        document.addEventListener('click', function(event){
            const dropdownContainer = document.getElementById('profileDropdown');
            if (dropdownContainer && !dropdownContainer.contains(event.target)) setProfileDropdownState(false);
        });
        document.addEventListener('keydown', function(event){ if (event.key === 'Escape') setProfileDropdownState(false); });

        const state = { user: null, userDocId: null };

        function setLoading(show) {
            document.getElementById('loadingState').style.display = show ? 'block' : 'none';
        }
        function setError(show) {
            document.getElementById('errorState').style.display = show ? 'block' : 'none';
        }
        function fillUI(user) {
            const name = user.name || 'User';
            const email = user.email || 'Not set';
            const phone = user.phone || '';
            const method = user.signInMethod || 'phone';
            document.getElementById('userName').textContent = name;
            document.getElementById('userPhone').textContent = phone;
            document.getElementById('detailName').textContent = name;
            document.getElementById('detailEmail').textContent = email || 'Not set';
            document.getElementById('detailPhone').textContent = phone;
            document.getElementById('detailMethod').textContent = method.toUpperCase();

            const duName = document.getElementById('dropdownUserName');
            const duPhone = document.getElementById('dropdownUserPhone');
            const guestOptions = document.getElementById('guestOptions');
            const authOptions = document.getElementById('authenticatedOptions');
            if (duName) duName.textContent = name; if (duPhone) duPhone.textContent = phone;
            if (guestOptions) guestOptions.style.display = 'none';
            if (authOptions) authOptions.style.display = 'block';
        }

        async function ensureAuthOrRedirect() {
            try {
                // Prefer otpAuth current user
                if (window.otpAuth && typeof window.otpAuth.getCurrentUser === 'function') {
                    const u = await window.otpAuth.getCurrentUser();
                    if (u) return u;
                }
                // Fallback to session phone
                const phone = localStorage.getItem('jb_current_user');
                if (phone && window.jbAPI) {
                    const res = await window.jbAPI.getUserByPhone(phone);
                    if (res.success && res.user) return res.user;
                }
                // Redirect to login
                window.location.href = 'otp-login.html?redirect=my-profile.html';
                return null;
            } catch (e) {
                console.error('Auth check failed', e);
                window.location.href = 'otp-login.html?redirect=my-profile.html';
                return null;
            }
        }

        async function loadProfile() {
            setLoading(true); setError(false);
            try {
                const baseUser = await ensureAuthOrRedirect();
                if (!baseUser) return;

                // If baseUser already contains name/email/phone, use it, and also resolve docId
                let fullUser = baseUser;
                let docId = baseUser.docId || null;

                if (window.jbAPI) {
                    const res = await window.jbAPI.getUserByPhone(baseUser.phone || baseUser);
                    if (res && res.success && res.user) {
                        fullUser = res.user; docId = res.user.docId;
                    }
                }

                state.user = fullUser; state.userDocId = docId;
                fillUI(fullUser);
            } catch (err) {
                console.error('Failed to load profile', err);
                setError(true);
            } finally {
                setLoading(false);
            }
        }

        async function saveProfileEdits() {
            const name = document.getElementById('editName').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            if (!name) { alert('Please enter your name'); return; }
            try {
                // Use jbAPI.createUser which upserts by phone
                if (!window.jbAPI) throw new Error('API not initialized yet');
                const phone = state.user?.phone;
                if (!phone) throw new Error('Phone missing for update');
                const result = await window.jbAPI.createUser({ name, email, phone, signInMethod: state.user?.signInMethod || 'phone' });
                if (result && result.success) {
                    // Reload profile from DB
                    await loadProfile();
                    closeEdit();
                } else {
                    throw new Error(result?.error || 'Update failed');
                }
            } catch (e) {
                console.error('Save failed', e);
                alert('Could not save changes. Please try again.');
            }
        }

        function openEdit() {
            document.getElementById('editName').value = state.user?.name || '';
            document.getElementById('editEmail').value = state.user?.email || '';
            document.getElementById('editModal').classList.add('show');
        }
        function closeEdit() { document.getElementById('editModal').classList.remove('show'); }

        // Simple helpers
        function contactUs() {
            // Open chat support - same logic as openContactChat
            if (window.supportChat && window.supportChat.openChat) {
                window.supportChat.openChat();
            } else {
                // Initialize chat with forceInit and hideFloatingButton options
                if (typeof SupportChat !== 'undefined') {
                    window.supportChat = new SupportChat({ forceInit: true, hideFloatingButton: true });
                    setTimeout(() => {
                        if (window.supportChat && window.supportChat.openChat) {
                            window.supportChat.openChat();
                        }
                    }, 300);
                } else {
                    window.location.href = 'mailto:jbcreationssss@gmail.com?subject=Support%20Request';
                }
            }
        }
        function aboutUs() {
            window.location.href = 'about-us.html';
        }

        // Wire up events
        document.addEventListener('DOMContentLoaded', async function(){
            setupProfileDropdown();
            document.getElementById('editProfileBtn').addEventListener('click', openEdit);
            document.getElementById('closeEditBtn').addEventListener('click', closeEdit);
            document.getElementById('cancelEditBtn').addEventListener('click', closeEdit);
            document.getElementById('saveEditBtn').addEventListener('click', saveProfileEdits);
            // Removed Security & Preferences section, so no related event bindings

            // Wait a bit for Firebase API
            setTimeout(loadProfile, 250);
        });
    </script>

</body>
</html>
